name: frontend
description: ShelfScan-AI frontend
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.2
  flutter_inappwebview: ^6.1.5
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true